<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>SMS모아 - 대출서류안내</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding-bottom: 4rem; }

.header { padding: 1.25rem 1rem 1rem; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 20; }
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 13px; color: #666; margin-top: 3px; }

.tab-nav { display: flex; background: #fff; border-bottom: 0.5px solid rgba(0,0,0,0.1); position: sticky; top: 62px; z-index: 19; }
.tab-btn { flex: 1; padding: 11px 4px; font-size: 13px; font-weight: 500; color: #999; background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab-btn.active { color: #1D9E75; border-bottom-color: #1D9E75; }

.section-label { font-size: 11px; font-weight: 600; color: #999; letter-spacing: 0.07em; text-transform: uppercase; padding: 1.1rem 1rem 0.45rem; }

.page { display: none; }
.page.active { display: block; }

/* ── Template list ── */
.tpl-list { padding: 0 1rem; display: flex; flex-direction: column; gap: 10px; }
.tpl-card { background: #fff; border: 1.5px solid #e8e8e4; border-radius: 14px; overflow: hidden; }
.tpl-card-head { display: flex; align-items: center; gap: 10px; padding: 13px 14px; cursor: pointer; }
.tpl-card-head:active { background: #f9f9f7; }
.tpl-num { width: 28px; height: 28px; border-radius: 50%; background: #e1f5ee; color: #0f6e56; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tpl-info { flex: 1; min-width: 0; }
.tpl-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tpl-meta { font-size: 12px; color: #888; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tpl-arrow { font-size: 18px; color: #ccc; flex-shrink: 0; }
.tpl-send-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 11px; background: #1D9E75; color: #fff; font-size: 14px; font-weight: 600; border: none; cursor: pointer; }
.tpl-send-btn:active { background: #0f6e56; }

/* ── Edit page header ── */
.edit-back { display: flex; align-items: center; gap: 8px; padding: 1rem 1rem 0; cursor: pointer; color: #1D9E75; font-size: 14px; font-weight: 500; background: none; border: none; }
.edit-back i { font-size: 18px; }
.edit-name-row { display: flex; align-items: center; gap: 8px; padding: 0.75rem 1rem 0; }
.edit-name-input { flex: 1; font-size: 17px; font-weight: 600; border: none; border-bottom: 1.5px solid #e0e0db; background: transparent; padding: 4px 0 6px; color: #1a1a1a; outline: none; }
.edit-name-input:focus { border-bottom-color: #1D9E75; }

/* ── Unified doc list ── */
.doc-section { padding: 0 1rem; }
.doc-count-row { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0 0.6rem; }
.doc-count-text { font-size: 13px; color: #666; }
.doc-count-text strong { color: #1a1a1a; }
.doc-count-badge { font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px; background: #e1f5ee; color: #0f6e56; }
.doc-count-badge.warn { background: #fef3e2; color: #e67e22; }
.doc-count-badge.full { background: #fde8e8; color: #c0392b; }

.unified-doc-list { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 14px; overflow: hidden; margin-bottom: 10px; }
.unified-doc-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-bottom: 0.5px solid rgba(0,0,0,0.07); }
.unified-doc-item:last-child { border-bottom: none; }

/* view mode */
.doc-item-name { flex: 1; font-size: 15px; color: #1a1a1a; line-height: 1.4; }
.doc-item-name small { display: block; font-size: 12px; color: #888; margin-top: 1px; }
.doc-item-edit-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: transparent; color: #aaa; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.doc-item-edit-btn:active { background: #f0f0ec; color: #555; }
.doc-item-del-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: transparent; color: #e0a0a0; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.doc-item-del-btn:active { background: #fde8e8; color: #c0392b; }

/* inline edit mode */
.doc-item-input-wrap { flex: 1; display: flex; gap: 6px; align-items: center; }
.doc-item-input { flex: 1; font-size: 15px; padding: 5px 9px; border: 1.5px solid #1D9E75; border-radius: 8px; background: #fff; color: #1a1a1a; outline: none; font-family: inherit; }
.doc-item-confirm-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: #1D9E75; color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.doc-item-cancel-btn { width: 30px; height: 30px; border-radius: 8px; border: none; background: #f0f0ec; color: #666; font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

/* add row */
.doc-add-row { display: flex; gap: 8px; }
.doc-add-input { flex: 1; padding: 12px 14px; border: 1.5px solid #e0e0db; border-radius: 10px; font-size: 15px; font-family: inherit; color: #1a1a1a; background: #fff; outline: none; transition: border-color 0.15s; }
.doc-add-input:focus { border-color: #1D9E75; }
.doc-add-btn { padding: 12px 16px; border: none; border-radius: 10px; background: #1D9E75; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.doc-add-btn:active { background: #0f6e56; }

/* ── Preview ── */
.preview-wrap { margin: 0 1rem; }
.preview-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 14px; overflow: hidden; }
.preview-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 1rem; border-bottom: 0.5px solid rgba(0,0,0,0.07); }
.preview-header-title { font-size: 13px; font-weight: 600; color: #666; }
.preview-tag { font-size: 11px; padding: 3px 9px; border-radius: 999px; background: #e1f5ee; color: #0f6e56; font-weight: 500; }
.preview-body { padding: 1rem; font-size: 14px; line-height: 1.75; white-space: pre-wrap; word-break: keep-all; color: #1a1a1a; }
.preview-sig { padding: 10px 1rem 1rem; font-size: 13px; color: #888; line-height: 1.6; white-space: pre-wrap; border-top: 0.5px dashed rgba(0,0,0,0.1); }

/* ── Action buttons ── */
.action-row { display: flex; gap: 8px; padding: 1rem; }
.copy-btn { flex: 1; padding: 14px; border: 1.5px solid #ddd; border-radius: 12px; background: #fff; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; color: #333; }
.copy-btn:active { background: #f5f5f0; }
.sms-btn { flex: 1.4; padding: 14px; border: none; border-radius: 12px; background: #1D9E75; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; color: #fff; }
.sms-btn:active { background: #0f6e56; transform: scale(0.97); }
.save-btn-wrap { padding: 0 1rem 0.5rem; }
.save-btn { width: 100%; padding: 14px; border: 1.5px solid #1D9E75; border-radius: 12px; background: #fff; font-size: 15px; font-weight: 600; color: #1D9E75; cursor: pointer; }
.save-btn:active { background: #f0faf6; }

/* ── Signature page ── */
.sig-page { padding: 0 1rem; }
.sig-field { margin-bottom: 1rem; }
.sig-field label { font-size: 12px; font-weight: 600; color: #666; display: block; margin-bottom: 6px; }
.sig-field input, .sig-field textarea { width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0db; border-radius: 10px; font-size: 15px; font-family: inherit; color: #1a1a1a; background: #fff; outline: none; resize: none; transition: border-color 0.15s; }
.sig-field input:focus, .sig-field textarea:focus { border-color: #1D9E75; }
.sig-preview-box { background: #f9f9f7; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 10px; padding: 14px; font-size: 14px; color: #333; line-height: 1.7; white-space: pre-wrap; word-break: keep-all; }
.sig-save-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #1D9E75; font-size: 15px; font-weight: 600; color: #fff; cursor: pointer; margin-top: 0.5rem; }
.sig-save-btn:active { background: #0f6e56; }
.sig-saved-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: #0f6e56; background: #e1f5ee; padding: 4px 10px; border-radius: 999px; margin-top: 8px; }

/* ── Toast ── */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px); background: #222; color: #fff; padding: 11px 20px; border-radius: 999px; font-size: 14px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 200; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (prefers-color-scheme: dark) {
  body { background: #1a1a1a; color: #f0f0ec; }
  .header, .tab-nav { background: #242424; }
  .tpl-card, .preview-card, .copy-btn, .save-btn, .unified-doc-list { background: #242424; border-color: rgba(255,255,255,0.1) !important; }
  .tpl-card-head:active, .doc-item-edit-btn:active { background: #2e2e2e; }
  .edit-name-input { background: transparent; color: #f0f0ec; border-color: rgba(255,255,255,0.15); }
  .sig-field input, .sig-field textarea, .doc-add-input, .doc-item-input { background: #2a2a2a; color: #f0f0ec; border-color: rgba(255,255,255,0.12); }
  .sig-preview-box { background: #2a2a2a; color: #ccc; }
  .tpl-title, .doc-item-name, .preview-body, .doc-count-text strong, .preview-header-title { color: #f0f0ec; }
  .copy-btn { color: #e0e0db; }
  .tab-btn { color: #666; }
  .tpl-arrow { color: #555; }
  .doc-item-cancel-btn { background: #2e2e2e; color: #aaa; }
  .doc-item-edit-btn { color: #666; }
  .doc-item-del-btn { color: #8b4040; }
  .unified-doc-item { border-color: rgba(255,255,255,0.07) !important; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>SMS모아 <span style="font-size:13px;font-weight:400;color:#1D9E75;margin-left:4px">대출서류안내</span></h1>
    <p>템플릿을 구성하고 채무자에게 문자를 발송하세요</p>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" onclick="showTab('templates')">📋 템플릿 목록</button>
    <button class="tab-btn" onclick="showTab('signature')">👤 공통 서명</button>
  </div>

  <!-- PAGE: Template List -->
  <div class="page active" id="page-templates">
    <div style="display:flex;justify-content:center;padding:10px 0 4px;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.06);">
      <script src="https://ads-partners.coupang.com/g.js"></script>
      <script>
        new PartnersCoupang.G({"id":999882,"template":"carousel","trackingCode":"AF0621176","width":"320","height":"50","tsource":""});
      </script>
    </div>
    <div class="section-label">저장된 템플릿</div>
    <div class="tpl-list" id="tplList"></div>
  </div>

  <!-- PAGE: Template Edit -->
  <div class="page" id="page-edit">
    <button class="edit-back" onclick="backToList()">
      <i class="ti ti-arrow-left" aria-hidden="true"></i> 목록으로
    </button>
    <div class="edit-name-row">
      <input class="edit-name-input" id="editName" type="text" placeholder="템플릿 이름" maxlength="20">
    </div>

    <div class="section-label">서류 목록</div>
    <div class="doc-section">
      <div class="doc-count-row">
        <span class="doc-count-text">총 <strong id="docCountNum">0</strong>개</span>
        <span class="doc-count-badge" id="docCountBadge">0 / 20</span>
      </div>
      <div class="unified-doc-list" id="unifiedDocList"></div>
      <div class="doc-add-row" style="margin-bottom:0.5rem">
        <input class="doc-add-input" id="docAddInput" type="text" placeholder="서류명 입력 후 추가 (예: 재직증명서)" maxlength="30"
          onkeydown="if(event.key==='Enter')addDoc()">
        <button class="doc-add-btn" onclick="addDoc()">
          <i class="ti ti-plus" aria-hidden="true"></i> 추가
        </button>
      </div>
    </div>

    <div class="section-label">미리보기</div>
    <div class="preview-wrap">
      <div class="preview-card">
        <div class="preview-header">
          <span class="preview-header-title">발송될 문자 내용</span>
          <span class="preview-tag" id="previewTag">0개 서류</span>
        </div>
        <div class="preview-body" id="previewBody"></div>
        <div class="preview-sig" id="previewSig" style="display:none"></div>
      </div>
    </div>
    <div style="display:flex;justify-content:center;padding:4px 0;">
      <script src="https://ads-partners.coupang.com/g.js"></script>
      <script>
        new PartnersCoupang.G({"id":999907,"template":"carousel","trackingCode":"AF0621176","width":"320","height":"50","tsource":""});
      </script>
    </div>
    <div class="action-row">
      <button class="copy-btn" onclick="doSendAction('copy')">
        <i class="ti ti-copy" aria-hidden="true"></i> 복사
      </button>
      <button class="sms-btn" onclick="doSendAction('sms')">
        <i class="ti ti-send" aria-hidden="true"></i> 문자 발송
      </button>
    </div>
    <div class="save-btn-wrap">
      <button class="save-btn" onclick="saveTemplate()">
        <i class="ti ti-device-floppy" aria-hidden="true" style="font-size:16px;vertical-align:-2px;margin-right:4px"></i> 이 템플릿 저장
      </button>
    </div>
  </div>

  <!-- PAGE: Signature -->
  <div class="page" id="page-signature">
    <div class="sig-page">
      <div class="section-label" style="padding-left:0">담당자 정보 (모든 문자 하단에 공통 추가)</div>
      <div class="sig-field">
        <label>이름 / 직함</label>
        <input type="text" id="sigName" placeholder="예) 김농협 과장" maxlength="30">
      </div>
      <div class="sig-field">
        <label>연락처</label>
        <input type="tel" id="sigPhone" placeholder="예) 010-1234-5678" maxlength="20">
      </div>
      <div class="sig-field">
        <label>사무실 주소</label>
        <textarea id="sigAddress" rows="2" placeholder="예) 경상북도 울릉군 울릉읍 독도리 1"></textarea>
      </div>
      <div class="sig-field">
        <label>미리보기</label>
        <div class="sig-preview-box" id="sigPreview">담당자 정보를 입력하면 여기에 표시됩니다.</div>
      </div>
      <button class="sig-save-btn" onclick="saveSignature()">
        <i class="ti ti-check" aria-hidden="true" style="font-size:16px;vertical-align:-2px;margin-right:4px"></i> 저장하기
      </button>
      <div id="sigSavedBadge" style="display:none;margin-top:8px">
        <span class="sig-saved-badge"><i class="ti ti-check" aria-hidden="true"></i> 저장되었습니다</span>
      </div>
      <div style="display:flex;justify-content:center;padding:16px 0 4px;">
        <script src="https://ads-partners.coupang.com/g.js"></script>
        <script>
          new PartnersCoupang.G({"id":999906,"template":"carousel","trackingCode":"AF0621176","width":"320","height":"50","tsource":""});
        </script>
      </div>
    </div>
  </div>
<footer style="text-align:center;padding:2rem 1rem 1rem;font-size:12px;color:#1D9E75;letter-spacing:0.03em;font-weight:600;">
    MADE BY 충주농협 김준한
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
const MAX_DOCS = 30;

// 기본 서류 원본 (복원용)
const BASE_DOCS = [
  { name:'신분증' },
  { name:'국세완납증명서' },
  { name:'지방세완납증명서' },
  { name:'지방세세목별과세증명서' },
  { name:'건강보험자격득실확인서', sub:'현재 자격 기준' },
  { name:'납부내역증명', sub:'최근 3개년, 국세' },
  { name:'등기권리증', sub:'담보물' },
  { name:'매매계약서', sub:'소유권 이전시' },
  { name:'인감', sub:'본인발급' },
  { name:'인감증명서' },
  { name:'주민등록초본', sub:'전주소 포함' },
  { name:'전입세대열람내역', sub:'주택' },
  { name:'상가임대차현황확인서', sub:'상가' },
  { name:'소득금액증명원', sub:'최근 2개년' },
  { name:'재직증명서' },
  { name:'근로소득원천징수영수증', sub:'최근 2개년' },
  { name:'농업경영체등록확인서' },
  { name:'사실증명원', sub:'소득신고사실없음 유형' },
  { name:'사업자등록증명원' },
  { name:'연금증서 / 연금수급권자 확인서' },
  { name:'연금수급자료', sub:'통장거래내역확인서' },
];

// 템플릿의 docs는 이제 { name, sub? } 객체 배열로 통일
const DEFAULT_TEMPLATES = [
  { id:1, name:'신용대출', docs: JSON.parse(JSON.stringify(BASE_DOCS)) },
  { id:2, name:'담보대출', docs: JSON.parse(JSON.stringify(BASE_DOCS)) },
  { id:3, name:'템플릿 3', docs: JSON.parse(JSON.stringify(BASE_DOCS)) },
  { id:4, name:'템플릿 4', docs: JSON.parse(JSON.stringify(BASE_DOCS)) },
  { id:5, name:'템플릿 5', docs: JSON.parse(JSON.stringify(BASE_DOCS)) },
  { id:6, name:'템플릿 6', docs: JSON.parse(JSON.stringify(BASE_DOCS)) },
];

let templates = loadTemplates();
let signature = loadSignature();
let editingId = null;
let editDocs = [];       // 현재 편집 중인 통합 서류 배열 [{name, sub?}]
let editingDocIdx = -1;  // 인라인 편집 중인 인덱스 (-1 = 없음)

/* ── Storage ── */
function loadTemplates() {
  try {
    const r = localStorage.getItem('loan_templates_v2');
    if (r) return JSON.parse(r);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
}
function saveTemplatesLS() {
  try { localStorage.setItem('loan_templates_v2', JSON.stringify(templates)); } catch(e) {}
}
function loadSignature() {
  try { const r = localStorage.getItem('loan_signature'); if (r) return JSON.parse(r); } catch(e) {}
  return { name:'', phone:'', address:'' };
}
function saveSignatureLS() {
  try { localStorage.setItem('loan_signature', JSON.stringify(signature)); } catch(e) {}
}

/* ── Tab / Page ── */
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['templates','signature'][i] === tab));
  if (tab === 'signature') { renderSigPage(); showPage('page-signature'); }
  else showPage('page-templates');
}
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ── Template list ── */
function renderTemplateList() {
  document.getElementById('tplList').innerHTML = templates.map(t => {
    const names = (t.docs||[]).map(d=>d.name);
    const meta = names.length ? names.join(', ') : '서류 미설정';
    const hasDoc = names.length > 0;
    return `
      <div class="tpl-card">
        <div class="tpl-card-head" onclick="openEdit(${t.id})">
          <div class="tpl-num">${t.id}</div>
          <div class="tpl-info">
            <div class="tpl-title">${esc(t.name)}</div>
            <div class="tpl-meta">${esc(meta)}</div>
          </div>
          <i class="ti ti-chevron-right tpl-arrow" aria-hidden="true"></i>
        </div>
        ${hasDoc ? `<button class="tpl-send-btn" onclick="quickSend(${t.id})"><i class="ti ti-send" aria-hidden="true"></i> 바로 문자 발송</button>` : ''}
      </div>`;
  }).join('');
}

/* ── Edit page ── */
function openEdit(id) {
  editingId = id;
  const t = templates.find(x=>x.id===id);
  editDocs = JSON.parse(JSON.stringify(t.docs || []));
  editingDocIdx = -1;
  document.getElementById('editName').value = t.name;
  renderUnifiedDocs();
  updatePreview();
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  showPage('page-edit');
}
function backToList() {
  editingDocIdx = -1;
  renderTemplateList();
  showPage('page-templates');
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
}

/* ── Unified doc list render ── */
function renderUnifiedDocs() {
  const count = editDocs.length;
  document.getElementById('docCountNum').textContent = count;
  const badge = document.getElementById('docCountBadge');
  badge.textContent = `${count} / ${MAX_DOCS}`;
  badge.className = 'doc-count-badge' + (count >= MAX_DOCS ? ' full' : count >= MAX_DOCS - 3 ? ' warn' : '');

  const list = document.getElementById('unifiedDocList');
  if (count === 0) {
    list.innerHTML = `<div style="padding:18px 14px;font-size:14px;color:#aaa;text-align:center">서류를 추가해 주세요</div>`;
    return;
  }

  list.innerHTML = editDocs.map((d, i) => {
    if (i === editingDocIdx) {
      // 인라인 편집 모드
      return `
        <div class="unified-doc-item">
          <div class="doc-item-input-wrap">
            <input class="doc-item-input" id="docInlineInput-${i}" type="text"
              value="${esc(d.name)}" maxlength="30"
              onkeydown="handleInlineKey(event,${i})">
          </div>
          <button class="doc-item-confirm-btn" onclick="confirmEditDoc(${i})" title="확인">
            <i class="ti ti-check" aria-hidden="true"></i>
          </button>
          <button class="doc-item-cancel-btn" onclick="cancelEditDoc()" title="취소">
            <i class="ti ti-x" aria-hidden="true"></i>
          </button>
        </div>`;
    }
    return `
      <div class="unified-doc-item">
        <div class="doc-item-name">
          ${esc(d.name)}${d.sub ? `<small>${esc(d.sub)}</small>` : ''}
        </div>
        <button class="doc-item-edit-btn" onclick="startEditDoc(${i})" title="이름 수정">
          <i class="ti ti-pencil" aria-hidden="true"></i>
        </button>
        <button class="doc-item-del-btn" onclick="deleteDoc(${i})" title="삭제">
          <i class="ti ti-trash" aria-hidden="true"></i>
        </button>
      </div>`;
  }).join('');

  // 인라인 입력창 포커스
  if (editingDocIdx >= 0) {
    const inp = document.getElementById(`docInlineInput-${editingDocIdx}`);
    if (inp) { inp.focus(); inp.select(); }
  }
}

function startEditDoc(i) {
  editingDocIdx = i;
  renderUnifiedDocs();
}
function cancelEditDoc() {
  editingDocIdx = -1;
  renderUnifiedDocs();
}
function confirmEditDoc(i) {
  const inp = document.getElementById(`docInlineInput-${i}`);
  const val = inp ? inp.value.trim() : '';
  if (!val) { showToast('서류명을 입력해 주세요'); return; }
  editDocs[i] = { name: val }; // sub 제거 (직접 수정 시 부제목 없앰)
  editingDocIdx = -1;
  renderUnifiedDocs();
  updatePreview();
}
function handleInlineKey(e, i) {
  if (e.key === 'Enter') confirmEditDoc(i);
  if (e.key === 'Escape') cancelEditDoc();
}
function deleteDoc(i) {
  editDocs.splice(i, 1);
  if (editingDocIdx === i) editingDocIdx = -1;
  else if (editingDocIdx > i) editingDocIdx--;
  renderUnifiedDocs();
  updatePreview();
}
function addDoc() {
  const input = document.getElementById('docAddInput');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  if (editDocs.length >= MAX_DOCS) { showToast(`서류는 최대 ${MAX_DOCS}개까지 추가할 수 있습니다`); return; }
  editingDocIdx = -1;
  editDocs.push({ name });
  input.value = '';
  renderUnifiedDocs();
  updatePreview();
  input.focus();
}

/* ── Message build ── */
function buildMessage(docs) {
  const items = (docs||[]).map(d => d.sub ? `${d.name}(${d.sub})` : d.name);
  if (!items.length) return '';
  return `안녕하세요.\n대출 진행 관련하여 필요 서류를 안내드립니다.\n\n${items.map((n,i)=>`${i+1}. ${n}`).join('\n')}\n\n감사합니다.`;
}
function buildSigText() {
  const parts = [signature.name, signature.phone, signature.address].filter(Boolean);
  return parts.length ? parts.join('\n') : '';
}
function buildFullMessage(docs) {
  const body = buildMessage(docs);
  const sig = buildSigText();
  if (!body) return '';
  return sig ? `${body}\n\n---\n${sig}` : body;
}

function updatePreview() {
  const body = buildMessage(editDocs);
  const sig = buildSigText();
  const count = editDocs.length;
  document.getElementById('previewTag').textContent = count ? `${count}개 서류` : '서류 미선택';
  const bodyEl = document.getElementById('previewBody');
  bodyEl.textContent = body || '서류를 추가하면 문자 내용이 표시됩니다.';
  bodyEl.style.color = body ? '' : '#aaa';
  const sigEl = document.getElementById('previewSig');
  if (sig) { sigEl.textContent = sig; sigEl.style.display='block'; } else { sigEl.style.display='none'; }
}

function saveTemplate() {
  const t = templates.find(x=>x.id===editingId);
  t.name = document.getElementById('editName').value.trim() || t.name;
  t.docs = JSON.parse(JSON.stringify(editDocs));
  saveTemplatesLS();
  showToast('템플릿이 저장되었습니다');
  setTimeout(backToList, 900);
}

/* ── Send ── */
function doSendAction(mode) {
  const msg = buildFullMessage(editDocs);
  if (!msg) { showToast('서류를 먼저 추가해 주세요'); return; }
  if (mode === 'copy') { copyText(msg); showToast('클립보드에 복사되었습니다'); }
  else openSms(msg);
}
function quickSend(id) {
  const t = templates.find(x=>x.id===id);
  const msg = buildFullMessage(t.docs||[]);
  if (!msg) { showToast('서류가 설정되어 있지 않습니다'); return; }
  openSms(msg);
}

/* ── Signature page ── */
function renderSigPage() {
  document.getElementById('sigName').value = signature.name || '';
  document.getElementById('sigPhone').value = signature.phone || '';
  document.getElementById('sigAddress').value = signature.address || '';
  updateSigPreview();
  ['sigName','sigPhone','sigAddress'].forEach(id => { document.getElementById(id).oninput = updateSigPreview; });
}
function updateSigPreview() {
  const parts = [
    document.getElementById('sigName').value.trim(),
    document.getElementById('sigPhone').value.trim(),
    document.getElementById('sigAddress').value.trim()
  ].filter(Boolean);
  document.getElementById('sigPreview').textContent = parts.length ? parts.join('\n') : '담당자 정보를 입력하면 여기에 표시됩니다.';
}
function saveSignature() {
  signature = {
    name: document.getElementById('sigName').value.trim(),
    phone: document.getElementById('sigPhone').value.trim(),
    address: document.getElementById('sigAddress').value.trim(),
  };
  saveSignatureLS();
  document.getElementById('sigSavedBadge').style.display = 'block';
  showToast('공통 서명이 저장되었습니다');
  setTimeout(() => document.getElementById('sigSavedBadge').style.display='none', 3000);
}

/* ── Utils ── */
function openSms(msg) {
  const ua = navigator.userAgent;
  if (/iPhone|iPad|iPod/i.test(ua)) window.location.href = `sms:&body=${encodeURIComponent(msg)}`;
  else if (/Android/i.test(ua)) window.location.href = `sms:?body=${encodeURIComponent(msg)}`;
  else { copyText(msg); showToast('PC에서는 내용이 복사되었습니다'); }
}
function copyText(msg) {
  if (navigator.clipboard) navigator.clipboard.writeText(msg).catch(()=>fallbackCopy(msg));
  else fallbackCopy(msg);
}
function fallbackCopy(msg) {
  const ta = document.createElement('textarea');
  ta.value=msg; ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy');
  document.body.removeChild(ta);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderTemplateList();
</script>
